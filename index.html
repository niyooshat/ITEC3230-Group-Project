<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Window</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="auth-modal">
        <button class="close-btn" aria-label="Close">&times;</button>

        <div class="tab-row">
          <button class="tab active" id="signInTab">SIGN IN</button>
          <button class="tab" id="registerTab">REGISTER</button>
        </div>

        <form class="auth-form" id="signInForm">
          <label for="signin-username">Username:</label>
          <input type="text" id="signin-username" name="signin-username" />

          <label for="signin-password">Password:</label>
          <input type="password" id="signin-password" name="signin-password" />

          <p class="forgot-password">Forgot your password? Reset</p>

          <a href="homeAfter.html" class="submit-btn">Sign In</a>
        </form>

        <form class="auth-form hidden" id="registerForm">
          <label for="register-username">Username:</label>
          <input type="text" id="register-username" name="register-username" />

          <label for="register-email">Email:</label>
          <input type="email" id="register-email" name="register-email" />

          <label for="register-password">Password:</label>
          <input
            type="password"
            id="register-password"
            name="register-password"
          />

          <a href="homeAfter.html" class="submit-btn">Register</a>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
